# schoolcatering: login DISABLED — returns 503 on all auth-login surfaces
# Toggle: sudo sc-login on
location = /api/v1/auth/login {
    add_header Retry-After 3600 always;
    default_type application/json;
    return 503 "{\"statusCode\":503,\"message\":\"Login temporarily disabled for maintenance\"}";
}
location = /api/v1/auth/refresh {
    add_header Retry-After 3600 always;
    default_type application/json;
    return 503 "{\"statusCode\":503,\"message\":\"Login temporarily disabled for maintenance\"}";
}
location = /api/v1/auth/google/verify {
    add_header Retry-After 3600 always;
    default_type application/json;
    return 503 "{\"statusCode\":503,\"message\":\"Login temporarily disabled for maintenance\"}";
}
location = /api/v1/auth/google/dev {
    add_header Retry-After 3600 always;
    default_type application/json;
    return 503 "{\"statusCode\":503,\"message\":\"Login temporarily disabled for maintenance\"}";
}
